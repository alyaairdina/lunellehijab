<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login | Lunelle Hijab</title>

    <meta name="description"
          content="Login or create a Lunelle Hijab account for a faster checkout experience.">

    <meta name="keywords"
          content="Lunelle Hijab, Login, Create Account">

    <meta name="author"
          content="IML254 Group Project">

    <link rel="icon"
          href="images/logo.png">

    <link rel="preconnect"
          href="https://fonts.googleapis.com">

    <link rel="preconnect"
          href="https://fonts.gstatic.com"
          crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

    <link rel="stylesheet"
          href="style.css">

</head>

<body>

<div id="loading-screen">

    <div class="loading-container">

        <img src="images/logo.png"
             alt="Lunelle Hijab Logo"
             class="loading-logo">

        <h1 class="loading-title">Lunelle Hijab</h1>

        <p class="loading-tagline">Grace In Every Fold</p>

        <div class="loading-dots">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>

    </div>

</div>

<script>
    setTimeout(function () {
        const screen = document.getElementById("loading-screen");

        if (screen) {
            screen.classList.add("loading-hidden");
        }
    }, 4000);
</script>

<header id="header"></header>

<main id="page-content">

    <section class="breadcrumb-section">

        <div class="container">

            <a href="index.html">Home</a>

            <span>/</span>

            <span>Login</span>

        </div>

    </section>

    <section class="category-header section">

        <div class="container">

            <div class="category-card">

                <h1>Welcome Back</h1>

                <p>
                    Login to your Lunelle Hijab account or create a new one
                    to enjoy a faster checkout experience.
                </p>

            </div>

        </div>

    </section>

    <section class="auth-section">

        <div class="container">

            <div class="auth-wrap">

                <div class="auth-tabs">

                    <button type="button"
                            class="auth-tab active"
                            data-tab="loginForm">

                        Login

                    </button>

                    <button type="button"
                            class="auth-tab"
                            data-tab="registerForm">

                        Create Account

                    </button>

                </div>

                <!-- LOGIN FORM -->

                <form class="checkout-form auth-form active"
                      id="loginForm"
                      style="padding:0;box-shadow:none;">

                    <div class="form-group">

                        <label>Email Address</label>

                        <input type="email"
                               id="loginEmail"
                               placeholder="Enter your email"
                               required>

                    </div>

                    <div class="form-group">

                        <label>Password</label>

                        <input type="password"
                               id="loginPassword"
                               placeholder="Enter your password"
                               required>

                    </div>

                    <div class="auth-options">

                        <label>

                            <input type="checkbox">

                            Remember me

                        </label>

                        <a href="#">Forgot password?</a>

                    </div>

                    <button type="submit" class="btn">

                        Login

                    </button>

                    <p class="form-message" id="loginMessage"></p>

                    <p class="auth-switch">

                        New to Lunelle Hijab?

                        <button type="button" data-switch-tab="registerForm">

                            Create an account

                        </button>

                    </p>

                </form>

                <!-- REGISTER FORM -->

                <form class="checkout-form auth-form"
                      id="registerForm"
                      style="padding:0;box-shadow:none;">

                    <div class="form-group">

                        <label>Full Name</label>

                        <input type="text"
                               id="registerName"
                               placeholder="Enter your full name"
                               required>

                    </div>

                    <div class="form-group">

                        <label>Email Address</label>

                        <input type="email"
                               id="registerEmail"
                               placeholder="Enter your email"
                               required>

                    </div>

                    <div class="form-group">

                        <label>Password</label>

                        <input type="password"
                               id="registerPassword"
                               placeholder="Create a password"
                               required>

                    </div>

                    <div class="form-group">

                        <label>Confirm Password</label>

                        <input type="password"
                               id="registerConfirmPassword"
                               placeholder="Re-enter your password"
                               required>

                    </div>

                    <button type="submit" class="btn">

                        Create Account

                    </button>

                    <p class="form-message" id="registerMessage"></p>

                    <p class="auth-switch">

                        Already have an account?

                        <button type="button" data-switch-tab="loginForm">

                            Login instead

                        </button>

                    </p>

                </form>

            </div>

        </div>

    </section>

</main>

<footer id="footer"></footer>

<div id="luna-ai"></div>

<script src="js/product.js"></script>

<script src="js/main.js"></script>

</body>

</html>
